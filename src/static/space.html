    <script type="text/babel" data-presets="react">
      const { useRef, useEffect } = React;

      const FADE_MS = 500;
      const FADE_OUT_LEAD = 0.55;

      function FadingVideo({ src, className, style }) {
        const videoRef = useRef(null);
        const rafRef = useRef(null);
        const fadingOutRef = useRef(false);

        useEffect(() => {
          const video = videoRef.current;
          if (!video) return;

          const fadeTo = (target, duration) => {
            if (rafRef.current) cancelAnimationFrame(rafRef.current);
            const start = parseFloat(video.style.opacity) || 0;
            const startTime = performance.now();
            const step = (now) => {
              const t = Math.min((now - startTime) / duration, 1);
              video.style.opacity = String(start + (target - start) * t);
              if (t < 1) {
                rafRef.current = requestAnimationFrame(step);
              }
            };
            rafRef.current = requestAnimationFrame(step);
          };

          const onLoadedData = () => {
            video.style.opacity = "0";
            const p = video.play();
            if (p && p.catch) p.catch(() => {});
            fadeTo(1, FADE_MS);
          };

          const onTimeUpdate = () => {
            const remaining = video.duration - video.currentTime;
            if (!fadingOutRef.current && remaining <= FADE_OUT_LEAD && remaining > 0) {
              fadingOutRef.current = true;
              fadeTo(0, FADE_MS);
            }
          };

          const onEnded = () => {
            video.style.opacity = "0";
            setTimeout(() => {
              video.currentTime = 0;
              const p = video.play();
              if (p && p.catch) p.catch(() => {});
              fadingOutRef.current = false;
              fadeTo(1, FADE_MS);
            }, 100);
          };

          video.addEventListener("loadeddata", onLoadedData);
          video.addEventListener("timeupdate", onTimeUpdate);
          video.addEventListener("ended", onEnded);

          return () => {
            if (rafRef.current) cancelAnimationFrame(rafRef.current);
            video.removeEventListener("loadeddata", onLoadedData);
            video.removeEventListener("timeupdate", onTimeUpdate);
            video.removeEventListener("ended", onEnded);
          };
        }, [src]);

        return (
          <video
            ref={videoRef}
            src={src}
            className={className}
            style={{ opacity: 0, ...style }}
            autoPlay
            muted
            playsInline
            preload="auto"
          />
        );
      }

      window.FadingVideo = FadingVideo;
    </script>

    <script type="text/babel" data-presets="react">
      const { useRef: useRefBT, useEffect: useEffectBT, useState: useStateBT } = React;

      function BlurText({ text, className }) {
        const motion = window.Motion.motion;
        const ref = useRefBT(null);
        const [inView, setInView] = useStateBT(false);
        const words = text.split(" ");

        useEffectBT(() => {
          const el = ref.current;
          if (!el) return;
          const obs = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (e.isIntersecting) {
                  setInView(true);
                  obs.disconnect();
                }
              });
            },
            { threshold: 0.1 },
          );
          obs.observe(el);
          return () => obs.disconnect();
        }, []);

        return (
          <p
            ref={ref}
            className={className}
            style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", rowGap: "0.1em" }}
          >
            {words.map((word, i) => (
              <motion.span
                key={i}
                initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
                animate={
                  inView
                    ? {
                        filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                        opacity: [0, 0.5, 1],
                        y: [50, -5, 0],
                      }
                    : {}
                }
                transition={{
                  duration: 0.7,
                  times: [0, 0.5, 1],
                  ease: "easeOut",
                  delay: (i * 100) / 1000,
                }}
                style={{ display: "inline-block", marginRight: "0.28em" }}
              >
                {word}
              </motion.span>
            ))}
          </p>
        );
      }

      window.BlurText = BlurText;
    </script>

      // Suppress benign Framer Motion list-key warnings
      const _err = console.error;
      console.error = (...args) => {
        if (typeof args[0] === "string" && args[0].includes('unique "key"')) return;
        _err(...args);
      };

      const useStateApp = React.useState;
      const useEffectApp = React.useEffect;

      function getPage() {
        return (window.location.hash || "#home").replace("#", "") || "home";
      }

      function App() {
        const {
          Navbar,
          Hero,
          TransitionBridge,
          Capabilities,
          Voyages,
          Worlds,
          Innovation,
          PlanLaunch,
          Footer,
        } = window;
        const [page, setPage] = useStateApp(getPage());

        useEffectApp(() => {
          const onHash = () => {
            setPage(getPage());
            window.scrollTo(0, 0);
          };
          window.addEventListener("hashchange", onHash);
          return () => window.removeEventListener("hashchange", onHash);
        }, []);

        const footerBg =
          page === "home" || page === "innovation" ? window.CAP_VIDEO : window.HERO_VIDEO;

        return (
          <React.Fragment>
            <Navbar current={page} />
            {page === "voyages" && <Voyages />}
            {page === "worlds" && <Worlds />}
            {page === "innovation" && <Innovation />}
            {page === "plan-launch" && <PlanLaunch />}
            {page === "home" && (
              <>
                <Hero />
                <TransitionBridge />
                <Capabilities />
              </>
            )}
            <Footer bgSrc={footerBg} />
          </React.Fragment>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
